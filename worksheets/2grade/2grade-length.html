<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>2학년 길이재기 학습지</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nanum+Gothic:wght@400;700;800&display=swap');

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Nanum Gothic', sans-serif;
      background: #f7f9fc;
      color: #222;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .top-bar {
      background: #fff;
      border-bottom: 1px solid #e4eaf7;
      padding: 14px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }

    .top-bar-title {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .back-btn {
      color: #3b7de9;
      text-decoration: none;
      font-size: 14px;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .back-btn:hover { opacity: 0.75; }

    .title-text {
      font-size: 16px;
      font-weight: 800;
      color: #1a2540;
    }

    .btn-group {
      display: flex;
      gap: 10px;
    }

    .btn {
      padding: 9px 20px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      font-family: 'Nanum Gothic', sans-serif;
      font-weight: 700;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      transition: opacity 0.15s;
    }
    .btn:hover { opacity: 0.85; }
    .btn-print { background: #eef2fb; color: #3b7de9; }
    .btn-download { background: #3b7de9; color: #fff; }

    .pdf-container {
      flex: 1;
      padding: 20px;
    }

    iframe {
      width: 100%;
      height: calc(100vh - 120px);
      border: none;
      border-radius: 10px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      background: #fff;
    }

    @media (max-width: 600px) {
      .top-bar { padding: 12px 16px; }
      .title-text { font-size: 14px; }
      .btn { padding: 8px 14px; font-size: 13px; }
      .pdf-container { padding: 12px; }
      iframe { height: calc(100vh - 110px); }
    }
  </style>
</head>
<body>

  <div class="top-bar">
    <div class="top-bar-title">
      <a href="../../index.html" class="back-btn">← 목록</a>
      <span class="title-text">📏 2학년 · 길이재기</span>
    </div>
    <div class="btn-group">
      <button class="btn btn-print" onclick="printPDF()">🖨 바로 출력</button>
      <button class="btn btn-download" onclick="downloadPDF()">📄 PDF 다운로드</button>
    </div>
  </div>

  <div class="pdf-container">
    <iframe id="pdf-frame" src="2grade-length.pdf"></iframe>
  </div>

  <script>
    function printPDF() {
      var win = window.open('2grade-length.pdf', '_blank');
      if (win) {
        win.addEventListener('load', function () {
          win.focus();
          win.print();
        });
      }
    }

    async function downloadPDF() {
      try {
        var res = await fetch('2grade-length.pdf');
        var blob = await res.blob();
        var url = URL.createObjectURL(blob);
        var a = document.createElement('a');
        a.href = url;
        a.download = '2학년_길이재기.pdf';
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        setTimeout(function () { URL.revokeObjectURL(url); }, 1000);
      } catch (e) {
        window.open('2grade-length.pdf', '_blank');
      }
    }
  </script>

</body>
</html>
